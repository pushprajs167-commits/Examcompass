<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ExamCompass — India's Exam Preparation Guide</title>
<meta name="description" content="Free exam preparation guide for UPSC, NEET, JEE, CAT, CLAT, GATE, SSC, IBPS. Best books, important topics, PYQ analysis — all in one place."/>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080a;
  --surface:#111114;
  --card:#18181d;
  --border:#26262e;
  --border2:#32323c;
  --text:#f2f0ec;
  --muted:#6b6975;
  --muted2:#9b98a8;
  --accent:#e8ff47;
  --accent2:#ff6b35;
  --green:#4ade80;
  --blue:#60a5fa;
  --purple:#c084fc;
}
html{scroll-behavior:smooth}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:56px;
  background:rgba(8,8,10,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Clash Display',sans-serif;
  font-size:1.2rem;font-weight:700;letter-spacing:-0.5px;
  display:flex;align-items:center;gap:8px;cursor:pointer;
}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:1rem}
.updated-badge{
  display:flex;align-items:center;gap:6px;
  font-size:0.72rem;color:var(--muted2);
  background:var(--card);border:1px solid var(--border);
  padding:4px 10px;border-radius:20px;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* HERO */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:6rem 2rem 4rem;
  position:relative;overflow:hidden;
  text-align:center;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,255,71,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 50%, rgba(255,107,53,0.04) 0%, transparent 60%);
}
.hero-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 50%, black 0%, transparent 70%);
  opacity:0.3;
}
.hero-eyebrow{
  font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted2);margin-bottom:1.5rem;
  display:flex;align-items:center;gap:0.8rem;justify-content:center;
}
.hero-eyebrow::before,.hero-eyebrow::after{
  content:'';display:block;width:30px;height:1px;background:var(--border2);
}
.hero h1{
  font-family:'Clash Display',sans-serif;
  font-size:clamp(2.8rem,6vw,5.5rem);
  font-weight:700;line-height:1.05;
  letter-spacing:-2px;margin-bottom:1.5rem;
  position:relative;
}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero-sub{
  font-size:1.05rem;color:var(--muted2);line-height:1.7;
  max-width:500px;margin:0 auto 3rem;
}
.hero-stats{
  display:flex;gap:3rem;justify-content:center;
  margin-bottom:3.5rem;
}
.h-stat{}
.h-num{
  font-family:'Clash Display',sans-serif;
  font-size:2rem;font-weight:700;color:var(--text);
}
.h-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}
.scroll-hint{
  font-size:0.75rem;color:var(--muted);
  display:flex;align-items:center;gap:0.5rem;justify-content:center;
  animation:bounce 2s infinite;
}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* EXAMS SECTION */
.exams-section{
  max-width:1100px;margin:0 auto;
  padding:2rem 2rem 6rem;
}
.section-label{
  font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:1.5rem;
  display:flex;align-items:center;gap:0.8rem;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.exams-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:1px;background:var(--border);
  border:1px solid var(--border);
}
.exam-card{
  background:var(--surface);padding:1.8rem;
  cursor:pointer;transition:background 0.15s;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:0.8rem;
}
.exam-card:hover{background:var(--card)}
.exam-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:2px;
  background:var(--accent);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.25s ease;
}
.exam-card:hover::before{transform:scaleX(1)}
.exam-icon{font-size:1.8rem}
.exam-name{
  font-family:'Clash Display',sans-serif;
  font-size:1.2rem;font-weight:600;
}
.exam-full{font-size:0.78rem;color:var(--muted2);line-height:1.4}
.exam-meta{
  display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.3rem;
}
.emeta{
  font-size:0.65rem;padding:2px 8px;border-radius:2px;
  background:rgba(255,255,255,0.04);color:var(--muted2);
  border:1px solid var(--border);
}
.exam-arrow{
  position:absolute;right:1.2rem;bottom:1.2rem;
  color:var(--accent);font-size:1rem;
  opacity:0;transform:translateX(-6px);
  transition:all 0.2s;
}
.exam-card:hover .exam-arrow{opacity:1;transform:translateX(0)}

/* INNER PAGE */
#inner-page{display:none;min-height:100vh;padding-top:56px}

/* BREADCRUMB */
.breadcrumb{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.8rem 2rem;
  border-bottom:1px solid var(--border);
  font-size:0.75rem;color:var(--muted);
  background:var(--surface);
  position:sticky;top:56px;z-index:50;
  overflow-x:auto;white-space:nowrap;
}
.bc{cursor:pointer;transition:color 0.2s;padding:2px 0}
.bc:hover{color:var(--text)}
.bc.active{color:var(--accent)}
.bc-sep{color:var(--border2)}

/* INNER CONTENT */
.inner-content{max-width:1000px;margin:0 auto;padding:2rem}
.screen-label{
  font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--muted);margin-bottom:1.2rem;
}
.back-btn{
  display:inline-flex;align-items:center;gap:0.5rem;
  font-size:0.78rem;color:var(--muted2);cursor:pointer;
  margin-bottom:1.5rem;background:none;border:none;
  font-family:'Instrument Sans',sans-serif;padding:0;
  transition:color 0.2s;
}
.back-btn:hover{color:var(--text)}

/* SUBJECT GRID */
.subject-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:1px;background:var(--border);border:1px solid var(--border);
}
.subject-card{
  background:var(--surface);padding:1.5rem;
  cursor:pointer;transition:background 0.15s;
  display:flex;flex-direction:column;gap:0.5rem;
  position:relative;
}
.subject-card:hover{background:var(--card)}
.s-icon{font-size:1.6rem}
.s-name{font-family:'Clash Display',sans-serif;font-size:0.95rem;font-weight:600}
.s-desc{font-size:0.72rem;color:var(--muted)}
.s-arr{position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--accent);opacity:0;transition:opacity 0.2s}
.subject-card:hover .s-arr{opacity:1}

/* BOOKS */
.books-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border)}
.book-row{
  background:var(--surface);padding:1.2rem 1.4rem;
  cursor:pointer;transition:background 0.15s;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.book-row:hover{background:var(--card)}
.book-left{display:flex;flex-direction:column;gap:0.25rem}
.book-title{font-size:0.92rem;font-weight:600}
.book-author{font-size:0.73rem;color:var(--muted2)}
.book-note{font-size:0.72rem;color:var(--muted);font-style:italic}
.book-right{display:flex;align-items:center;gap:0.6rem;flex-shrink:0}
.tag{font-size:0.63rem;padding:3px 8px;border-radius:2px;font-weight:600;letter-spacing:0.03em}
.tag-must{background:rgba(232,255,71,0.12);color:var(--accent);border:1px solid rgba(232,255,71,0.2)}
.tag-ok{background:rgba(255,107,53,0.1);color:var(--accent2);border:1px solid rgba(255,107,53,0.2)}
.tag-ref{background:rgba(255,255,255,0.04);color:var(--muted2);border:1px solid var(--border)}
.chev{color:var(--muted);font-size:0.9rem}

/* TOPICS */
.topics-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border)}
.topics-col{background:var(--surface)}
.col-head{padding:0.8rem 1.2rem;border-bottom:1px solid var(--border);font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.topic-row{
  padding:0.85rem 1.2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:background 0.15s;
}
.topic-row:last-child{border-bottom:none}
.topic-row:hover{background:var(--card)}
.t-name{font-size:0.83rem}
.freq{font-size:0.63rem;padding:2px 8px;border-radius:2px;font-weight:600}
.fh{background:rgba(232,255,71,0.1);color:var(--accent)}
.fm{background:rgba(255,107,53,0.1);color:var(--accent2)}
.fl{background:rgba(255,255,255,0.04);color:var(--muted)}
.no-prelims{padding:1.2rem;font-size:0.8rem;color:var(--muted);font-style:italic}

/* ANALYSIS */
.analysis-box{
  background:var(--surface);border:1px solid var(--border);
  border-top:none;padding:1.4rem;
}
.analysis-title{font-size:0.67rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.bar-rows{display:flex;flex-direction:column;gap:0.7rem}
.bar-row{display:flex;align-items:center;gap:0.8rem}
.bar-label{font-size:0.73rem;color:var(--muted2);width:100px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.7s cubic-bezier(0.4,0,0.2,1)}
.bar-pct{font-size:0.7rem;color:var(--accent);width:30px;text-align:right;flex-shrink:0}

/* PYQs */
.pyq-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border)}
.pyq-row{background:var(--surface);padding:1.2rem 1.4rem;display:flex;gap:1.2rem;align-items:flex-start}
.pyq-year{font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent);min-width:46px;flex-shrink:0;padding-top:2px}
.pyq-right{}
.pyq-q{font-size:0.84rem;line-height:1.65;color:var(--text)}
.pyq-paper{margin-top:0.4rem;font-size:0.67rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
.no-pyq{padding:1.4rem;font-size:0.82rem;color:var(--muted);font-style:italic}

/* FADE ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 0.2s ease both}

/* FOOTER */
footer{
  border-top:1px solid var(--border);
  padding:2rem;text-align:center;
  font-size:0.75rem;color:var(--muted);
}

@media(max-width:640px){
  .hero h1{letter-spacing:-1px}
  .hero-stats{gap:1.5rem}
  .topics-wrap{grid-template-columns:1fr}
  .exams-grid{grid-template-columns:1fr 1fr}
  .inner-content{padding:1.2rem}
  .breadcrumb{padding:0.8rem 1.2rem}
  nav{padding:0 1.2rem}
}
</style>
</head>

// STATE
let state = {view:'subjects',examId:null,subjectId:null,bookTitle:null,topicName:null};

function showHome(){
  document.getElementById('home-page').style.display='block';
  document.getElementById('inner-page').style.display='none';
  state={view:'subjects',examId:null,subjectId:null,bookTitle:null,topicName:null};
}

function openExam(examId){
  state={view:'subjects',examId,subjectId:null,bookTitle:null,topicName:null};
  document.getElementById('home-page').style.display='none';
  document.getElementById('inner-page').style.display='block';
  renderInner();
}

function nav(view,extra={}){
  state={...state,view,...extra};
  renderInner();
}

function renderInner(){
  renderBreadcrumb();
  const c=document.getElementById('inner-content');
  c.classList.remove('fade');
  void c.offsetWidth;
  c.classList.add('fade');
  if(state.view==='subjects') renderSubjects(c);
  else if(state.view==='books') renderBooks(c);
  else if(state.view==='topics') renderTopics(c);
  else if(state.view==='pyqs') renderPyqs(c);
}

function renderBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  const exam=EXAMS.find(e=>e.id===state.examId);
  let html=`<span class="bc" onclick="showHome()">All Exams</span>`;
  if(exam) html+=`<span class="bc-sep">›</span><span class="bc ${state.view==='subjects'?'active':''}" onclick="nav('subjects')">${exam.name}</span>`;
  if(state.subjectId){
    const subs=DATA.subjects[state.examId]||[];
    const sub=subs.find(s=>s.id===state.subjectId);
    if(sub) html+=`<span class="bc-sep">›</span><span class="bc ${state.view==='books'||state.view==='topics'?'active':''}" onclick="nav('books',{subjectId:'${state.subjectId}'})">${sub.name}</span>`;
  }
  if(state.bookTitle) html+=`<span class="bc-sep">›</span><span class="bc ${state.view==='topics'?'active':''}" onclick="nav('topics',{subjectId:'${state.subjectId}',bookTitle:'${state.bookTitle.replace(/'/g,'\\\'')}'})">Topics</span>`;
  if(state.topicName) html+=`<span class="bc-sep">›</span><span class="bc active">${state.topicName}</span>`;
  bc.innerHTML=html;
}

function renderSubjects(c){
  const exam=EXAMS.find(e=>e.id===state.examId);
  const subs=DATA.subjects[state.examId]||[];
  c.innerHTML=`<div class="screen-label">${exam.icon} ${exam.name} — Select Subject</div>
  <div class="subject-grid">${subs.map(s=>`
    <div class="subject-card" onclick="nav('books',{subjectId:'${s.id}'})">
      <div class="s-icon">${s.icon}</div>
      <div class="s-name">${s.name}</div>
      <div class="s-desc">${s.desc}</div>
      <div class="s-arr">→</div>
    </div>`).join('')}</div>`;
}

function renderBooks(c){
  const exam=EXAMS.find(e=>e.id===state.examId);
  const subs=DATA.subjects[state.examId]||[];
  const sub=subs.find(s=>s.id===state.subjectId);
  const books=(DATA.books[state.examId]||{})[state.subjectId]||[];
  c.innerHTML=`<button class="back-btn" onclick="nav('subjects')">← Subjects</button>
  <div class="screen-label">${sub?.icon} ${sub?.name} — Books</div>
  <div class="books-list">${books.map(b=>`
    <div class="book-row" onclick="nav('topics',{subjectId:'${state.subjectId}',bookTitle:'${b.title.replace(/'/g,'\\\'')}'})">
      <div class="book-left">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-note">${b.note}</div>
      </div>
      <div class="book-right">
        <span class="tag tag-${b.tag}">${b.tag==='must'?'Must Read':b.tag==='ok'?'Helpful':'Reference'}</span>
        <span class="chev">›</span>
      </div>
    </div>`).join('')}</div>`;
}

function renderTopics(c){
  const subs=DATA.subjects[state.examId]||[];
  const sub=subs.find(s=>s.id===state.subjectId);
  const topicData=((DATA.topics[state.examId]||{})[state.subjectId])||{prelims:[],mains:[]};
  const analysis=((DATA.analysis[state.examId]||{})[state.subjectId])||[];

  const fl=f=>f==='h'?'Bahut Zyada':f==='m'?'Moderate':'Less';
  const fc=f=>f==='h'?'fh':f==='m'?'fm':'fl';

  const prelRow=t=>`<div class="topic-row" onclick="nav('pyqs',{subjectId:'${state.subjectId}',bookTitle:'${(state.bookTitle||'').replace(/'/g,'\\\'') }',topicName:'${t.name.replace(/'/g,'\\\'')}'})"><span class="t-name">${t.name}</span><span class="freq ${fc(t.freq)}">${fl(t.freq)}</span></div>`;

  const prelims=topicData.prelims?.length?topicData.prelims.map(prelRow).join(''):`<div class="no-prelims">Prelims mein alag topics nahi — MCQ based hai.</div>`;
  const mains=topicData.mains?.length?topicData.mains.map(prelRow).join(''):`<div class="no-prelims">Mains nahi hai is exam mein.</div>`;

  const bars=analysis.map(a=>`<div class="bar-row"><div class="bar-label">${a.l}</div><div class="bar-track"><div class="bar-fill" style="width:0%" data-pct="${a.p}%"></div></div><div class="bar-pct">${a.p}%</div></div>`).join('');

  c.innerHTML=`<button class="back-btn" onclick="nav('books',{subjectId:'${state.subjectId}'})">← Books</button>
  <div class="screen-label">${sub?.icon} ${sub?.name} — Topics (click topic to see PYQs)</div>
  <div class="topics-wrap">
    <div class="topics-col"><div class="col-head">Prelims / Paper 1</div>${prelims}</div>
    <div class="topics-col"><div class="col-head">Mains / Paper 2</div>${mains}</div>
  </div>
  <div class="analysis-box">
    <div class="analysis-title">📊 PYQ Weightage Analysis</div>
    <div class="bar-rows">${bars}</div>
  </div>`;

  setTimeout(()=>{
    c.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.pct});
  },100);
}

function renderPyqs(c){
  const subs=DATA.subjects[state.examId]||[];
  const sub=subs.find(s=>s.id===state.subjectId);
  const examPyqs=(DATA.pyqs[state.examId]||{});
  const subPyqs=(examPyqs[state.subjectId]||{});
  const topicPyqs=subPyqs[state.topicName]||[];

  const rows=topicPyqs.length?topicPyqs.map(p=>`
    <div class="pyq-row">
      <div class="pyq-year">${p.year}</div>
      <div class="pyq-right">
        <div class="pyq-q">${p.q}</div>
        <div class="pyq-paper">${p.paper}</div>
      </div>
    </div>`).join(''):`<div class="no-pyq">Is topic ke PYQs jald add honge.</div>`;

  c.innerHTML=`<button class="back-btn" onclick="nav('topics',{subjectId:'${state.subjectId}',bookTitle:'${(state.bookTitle||'').replace(/'/g,'\\\'') }'})">← Topics</button>
  <div class="screen-label">${sub?.icon} ${state.topicName} — Previous Year Questions</div>
  <div class="pyq-list">${rows}</div>`;
}

// RENDER HOME
function renderHome(){
  const grid=document.getElementById('exams-grid');
  grid.innerHTML=EXAMS.map(e=>`
    <div class="exam-card" onclick="openExam('${e.id}')">
      <div class="exam-icon">${e.icon}</div>
      <div class="exam-name">${e.name}</div>
      <div class="exam-full">${e.full}</div>
      <div class="exam-meta">${e.tags.map(t=>`<span class="emeta">${t}</span>`).join('')}</div>
      <div class="exam-arrow">→</div>
    </div>`).join('');
}
renderHome();
